name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/survey-app-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/survey-app-frontend
  IMAGE_GATEWAY: ghcr.io/${{ github.repository_owner }}/survey-app-gateway

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Create virtual environment
        run: python -m venv venv

      - name: Install backend dependencies
        run: ./venv/bin/pip install -r backend/requirements-dev.txt

      - name: Run linters
        run: npm run lint

      - name: Run backend and frontend tests
        run: npm run test

  container-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate compose configuration
        run: docker compose --env-file .env.ci config

      - name: Start application stack
        run: docker compose --env-file .env.ci up -d --build

      - name: Wait for gateway and API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null && \
               curl -fsS http://127.0.0.1:8080/api/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose --env-file .env.ci ps
          exit 1

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests against containers
        env:
          PLAYWRIGHT_EXTERNAL_SERVER: "1"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
          PLAYWRIGHT_API_BASE_URL: http://127.0.0.1:8080/api
        run: npm run test:e2e

      - name: Show container logs on failure
        if: failure()
        run: docker compose --env-file .env.ci logs --no-color

      - name: Stop application stack
        if: always()
        run: docker compose --env-file .env.ci down -v

  publish-images:
    runs-on: ubuntu-latest
    needs: container-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          build-args: |
            VITE_API_BASE_URL=/api
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}

      - name: Publish gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gateway/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_GATEWAY }}:latest
            ${{ env.IMAGE_GATEWAY }}:sha-${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != ''

    steps:
      - name: Deploy on target host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all --prune
            git checkout ${{ github.ref_name }}
            git pull --ff-only origin ${{ github.ref_name }}
            docker compose pull || true
            docker compose up -d --build --remove-orphans
